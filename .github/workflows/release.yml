name: Release

on:
  push:
    # Accept both `v1.2.3` and `1.2.3` tag styles. Version-verify enforces
    # semver shape + match against VERSION file.
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  # See ci.yml — `cyrius deps` shadows the version-pinned snapshot
  # with cwd lib (identical content); silence the informational note.
  CYRIUS_NO_WARN_SHADOW_LIB: "1"
  # Whole-program dead-code elimination — smaller release binary.
  CYRIUS_DCE: "1"

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  build:
    name: Build Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version
        run: |
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          TAG="${GITHUB_REF_NAME#v}"   # strip optional leading 'v' so v1.0.0 == 1.0.0
          echo "$TAG" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "tag ($TAG) is not semver x.y.z"; exit 1; }
          [ "$FILE_VERSION" = "$TAG" ] || {
            echo "VERSION ($FILE_VERSION) != tag ($TAG)"; exit 1; }
          grep -q '^version = "\${file:VERSION}"' cyrius.cyml || {
            echo "cyrius.cyml version must be \${file:VERSION}"; exit 1; }
          echo "Version verified: $TAG (cyrius.cyml pulls from VERSION via \${file:VERSION})"

      - name: Install Cyrius toolchain
        # Delegates to the upstream installer keyed on the cyrius.cyml
        # pin — lays out $HOME/.cyrius/{bin,lib} (binaries + stdlib
        # snapshot). See ci.yml for the rationale (replaces the pre-6.x
        # hand-rolled two-tarball extraction that probed for `bin/cc5`,
        # renamed cc5 → cycc on the 6.x toolchain).
        run: |
          set -e
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: cyrius --version

      - name: Resolve deps
        run: cyrius deps

      - name: Verify dep hashes
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Build (DCE)
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/daimon
          echo "daimon: $(wc -c < build/daimon) bytes"

      - name: Cross-build aarch64 (best-effort)
        # See ci.yml for the upstream-stdlib-gap rationale. Release ships
        # the x86_64 binary regardless; aarch64 is bonus when the build
        # is clean.
        run: |
          if [ ! -x "$HOME/.cyrius/bin/cycc_aarch64" ]; then
            echo "::warning::cycc_aarch64 not in toolchain — aarch64 binary skipped"
            exit 0
          fi
          if cyrius build --aarch64 src/main.cyr build/daimon-aarch64 2>&1 | tee /tmp/aarch64.log; then
            echo "daimon-aarch64: $(wc -c < build/daimon-aarch64) bytes"
            exit 0
          fi
          if grep -qE "undefined variable 'SYS_(FORK|EPOLL_WAIT)'" /tmp/aarch64.log; then
            echo "::warning::aarch64 cross-build blocked on an upstream stdlib gap (a SYS_* syscall not defined on aarch64 Linux — e.g. SYS_FORK / SYS_EPOLL_WAIT). x86_64 release ships without the aarch64 binary this tag."
            exit 0
          fi
          echo "ERROR: aarch64 cross-build failed for a non-blocker reason"
          exit 1

      - name: Test
        run: |
          for t in tests/*.tcyr; do
            [ -f "$t" ] || continue
            cyrius test "$t"
          done

      - name: Archive
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          git archive --format=tar.gz --prefix="daimon-${TAG}/" -o "daimon-${TAG}-src.tar.gz" HEAD
          if [ -f build/daimon ]; then
            cp build/daimon "daimon-${TAG}-x86_64-linux"
          fi
          if [ -f build/daimon-aarch64 ]; then
            cp build/daimon-aarch64 "daimon-${TAG}-aarch64-linux"
          fi
          sha256sum daimon-*.tar.gz daimon-*-linux 2>/dev/null > SHA256SUMS

      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            daimon-*.tar.gz
            daimon-*-linux
            cyrius.lock
            SHA256SUMS

  release:
    name: Create GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
      - name: Changelog
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          awk "/^## \\[${TAG}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" \
            CHANGELOG.md > /tmp/body.md
      - uses: softprops/action-gh-release@v2
        with:
          name: "daimon ${{ github.ref_name }}"
          body_path: /tmp/body.md
          prerelease: ${{ startsWith(github.ref_name, '0.') || startsWith(github.ref_name, 'v0.') }}
          files: |
            daimon-*.tar.gz
            daimon-*-linux
            cyrius.lock
            SHA256SUMS
