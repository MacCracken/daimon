name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Cyrius
        run: |
          curl -sSL https://github.com/MacCracken/cyrius/releases/latest/download/cyrius-linux-x86_64 -o /usr/local/bin/cc3
          chmod +x /usr/local/bin/cc3
      - name: Build
        run: cat src/main.cyr | cc3 > build/daimon && chmod +x build/daimon
      - name: Test
        run: sh tests/test.sh /usr/local/bin/cc3
