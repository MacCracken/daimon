name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # `cyrius deps` populates ./lib/ from the version-pinned snapshot,
  # which then shadows the global ~/.cyrius/versions/<V>/lib/ snapshot
  # on every subsequent `cyrius build` invocation. That's intentional
  # (the cwd lib IS the version-pinned content cyrius deps just
  # copied), but cyrius emits an informational note about it on every
  # build. Silence it across all CI steps. Mirrors agnosys / bote /
  # libro / majra CI post-5.10.x.
  CYRIUS_NO_WARN_SHADOW_LIB: "1"
  # Whole-program dead-code elimination — first-party convention.
  CYRIUS_DCE: "1"

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # The cyrius.cyml `[package].cyrius` pin is the single source of
        # truth for the toolchain version — nothing is hardcoded in this
        # YAML. Hand the pin to the upstream installer, which fetches +
        # lays out $HOME/.cyrius/{bin,lib}: binaries (cycc / cyrius /
        # cyrfmt / cyrlint ...) plus the stdlib snapshot, walking nested
        # lib/ subdirs. Replaces the pre-6.x hand-rolled two-tarball
        # extraction that probed for `bin/cc5` — the 6.x toolchain
        # renamed cc5 → cycc, so that gate failed on every 6.x install.
        # Same installer body as bote / patra / agnosys on 6.x.
        run: |
          set -e
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: cyrius --version

      - name: Resolve dependencies
        # Populates ./lib/ from the version-pinned stdlib snapshot
        # plus [deps.sakshi] dist bundle at its tagged version.
        # ./lib/ is gitignored — first-party convention across
        # agnosys / bote / libro / majra.
        run: cyrius deps

      - name: Verify dep hashes
        # Skip on the first push that introduces a new dep before
        # cyrius.lock has been generated and committed. Once present,
        # enforce.
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Vet
        run: cyrius vet src/main.cyr

      - name: Format check
        # `cyrius fmt --check` became a no-op in 5.9.x (emits nothing,
        # exits 0 regardless of drift), so diff against the committed
        # source is the actual gate. Covers src/ + tests/ + bench.
        run: |
          fail=0
          for f in src/*.cyr tests/*.tcyr tests/*.bcyr fuzz/*.fcyr; do
            [ -f "$f" ] || continue
            if ! diff -q <(cyrius fmt "$f" 2>/dev/null) "$f" > /dev/null; then
              echo "needs fmt: $f"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "fmt: drift detected"; exit 1; }

      - name: Lint
        # Fail-on-warn — daimon is clean under 6.1.24. Lint covers
        # src/ + tests/ + bench/ + fuzz/.
        run: |
          fail=0
          for f in src/*.cyr tests/*.tcyr tests/*.bcyr fuzz/*.fcyr; do
            [ -f "$f" ] || continue
            out=$(cyrius lint "$f" 2>&1)
            echo "$out"
            if echo "$out" | grep -qE '^\s*warn '; then
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present"; exit 1; }

      - name: Build (DCE)
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/daimon
          echo "daimon: $(wc -c < build/daimon) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/daimon | grep -q "7f45 4c46"

      - name: Cross-build aarch64 (best-effort)
        # Best-effort: only when cycc_aarch64 is in the toolchain bundle,
        # and tolerant of known upstream stdlib aarch64 gaps. Same posture
        # as sakshi 2.2.2's aarch64 lane (upstream stdlib emits unresolved
        # `vec_get` / `vec_len` refs there; we hit a different symbol).
        #
        # Known upstream-blocker symbols (downgrade to warning, exit 0) —
        # syscalls the aarch64 stdlib table doesn't define because the
        # syscall doesn't exist on aarch64 Linux:
        #   - SYS_FORK: aarch64 has no fork(2) syscall (clone-only). Surfaced
        #     at the cyrius 6.1.24 pin once the SYS_EPOLL_WAIT gap below was
        #     fixed upstream — it's the next undefined symbol in line.
        #   - SYS_EPOLL_WAIT: lib/async.cyr called it unconditionally while
        #     lib/syscalls_aarch64_linux.cyr only defined SYS_EPOLL_PWAIT
        #     (aarch64 has no plain epoll_wait). Kept here for older pins;
        #     tracked upstream at
        #     cyrius/docs/development/issues/2026-05-10-daimon-async-aarch64-sys-epoll-wait.md.
        #
        # Any other failure still fails the step — we want signal when a
        # daimon-side regression breaks the cross-build, just not when
        # upstream is the blocker.
        run: |
          if [ ! -x "$HOME/.cyrius/bin/cycc_aarch64" ]; then
            echo "::warning::cycc_aarch64 not shipped with this Cyrius toolchain — skipping"
            exit 0
          fi
          if cyrius build --aarch64 src/main.cyr build/daimon-aarch64 2>&1 | tee /tmp/aarch64.log; then
            file build/daimon-aarch64 | grep -q "aarch64" || {
              echo "ERROR: daimon-aarch64 is not aarch64 ELF"; exit 1; }
            echo "daimon-aarch64: $(wc -c < build/daimon-aarch64) bytes"
            exit 0
          fi
          # Build failed — check whether it's a known upstream stdlib gap.
          if grep -qE "undefined variable 'SYS_(FORK|EPOLL_WAIT)'" /tmp/aarch64.log; then
            echo "::warning::aarch64 cross-build blocked on an upstream stdlib gap (a SYS_* syscall not defined on aarch64 Linux — e.g. SYS_FORK / SYS_EPOLL_WAIT). Treated as non-fatal; x86_64 build remains authoritative."
            exit 0
          fi
          echo "ERROR: aarch64 cross-build failed for a non-blocker reason"
          exit 1

      - name: Test
        run: |
          fail=0
          for t in tests/*.tcyr; do
            [ -f "$t" ] || continue
            name=$(basename "$t" .tcyr)
            echo "=== $name ==="
            if ! cyrius test "$t"; then
              echo "FAIL: $name"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "test failures"; exit 1; }

      - name: Bench
        run: |
          for b in tests/*.bcyr; do
            [ -f "$b" ] || continue
            cyrius bench "$b"
          done

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        # daimon is a process supervisor — fork/execve/clone are intentional
        # (see src/main.cyr agent_spawn_with_limits). We scan for patterns
        # daimon should NEVER exhibit: writes to system paths, unbounded
        # stack buffers, unguarded shell-out via sys_system. Matches code
        # lines only — comments (#) are skipped.
        run: |
          FAIL=0
          scan() {
            local label="$1"; shift
            local pat="$1"; shift
            local hits
            hits=$(grep -rn "$pat" src/ 2>/dev/null | awk -F: '
              { line=$3; for(i=4;i<=NF;i++) line=line":"$i;
                sub(/^[[:space:]]+/,"",line);
                if (substr(line,1,1) != "#") print $1":"$2":"line }')
            if [ -n "$hits" ]; then
              echo "FAIL: $label"
              echo "$hits"
              FAIL=1
            fi
          }
          # Shell-out is forbidden (use sys_execve directly with arg arrays).
          scan "sys_system"      '\bsys_system\s*\('
          # Hardcoded system path writes — agent FS scope must stay sandboxed.
          scan "writes to /etc"  '"/etc/'
          scan "writes to /bin"  '"/bin/'
          scan "writes to /sbin" '"/sbin/'
          # Unbounded stack buffers (>= 64 KB) — force heap review.
          awk -F: '
            /var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]/ {
              match($0, /\[[0-9]+\]/); s=substr($0,RSTART+1,RLENGTH-2); n=s+0;
              if (n >= 65536) print FILENAME":"NR": large stack buffer ("n" bytes): "$0
            }' src/*.cyr | tee /tmp/bigbuf.txt
          [ -s /tmp/bigbuf.txt ] && FAIL=1
          echo "security scan complete (fail: $FAIL)"
          exit $FAIL

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required files
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md \
                   CODE_OF_CONDUCT.md LICENSE CLAUDE.md cyrius.cyml cyrius.lock \
                   docs/architecture/overview.md docs/development/roadmap.md \
                   docs/doc-health.md; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          FILE_VERSION=$(tr -d '[:space:]' < VERSION)
          echo "VERSION file: $FILE_VERSION"
          grep -q '^version = "\${file:VERSION}"' cyrius.cyml || {
            echo "FAIL: cyrius.cyml version must be \${file:VERSION}"; exit 1; }
          grep -q "\[$FILE_VERSION\]" CHANGELOG.md || {
            echo "FAIL: version $FILE_VERSION not in CHANGELOG.md"; exit 1; }
          echo "Version consistent: $FILE_VERSION (cyrius.cyml pulls from VERSION via \${file:VERSION})"
