[package]
name = "daimon"
version = "1.0.1"
description = "daimon — AGNOS agent orchestrator"
license = "GPL-3.0-only"
language = "cyrius"
cyrius = "4.2.0"

[build]
entry = "src/main.cyr"
output = "daimon"

[deps]
stdlib = ["string", "fmt", "alloc", "vec", "str", "syscalls", "io", "fs", "hashmap", "tagged", "json", "net", "args", "chrono", "sakshi", "fnptr", "process", "assert", "bench", "freelist"]
